_schema-version: '3.1'
ID: travel-tracking
version: 1.0.0
description: Travel Tracking Application

parameters:
  enable-parallel-deployments: true

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production

modules:
  # ----- SERVER MODULE -----
  - name: travel-tracking-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
      disk-quota: 1024M
    requires:
      - name: travel-tracking-db
      - name: travel-tracking-auth
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}

  # ----- DATABASE MODULE -----
  - name: travel-tracking-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: travel-tracking-db

  # ----- UI DEPLOYER MODULE -----
  - name: travel-tracking-app-deployer
    type: com.sap.application.content
    path: .
    requires:
      - name: travel-tracking-html5-repo-host
        parameters:
          content-target: true
    build-parameters:
      build-result: app/
      requires:
        - name: travel-tracking-traveltrackingui
          artifacts:
            - traveltrackingui.zip
          target-path: app//
        - name: travel-tracking-budgetmanagerui
          artifacts:
            - budgetmanagerui.zip
          target-path: app//
        - name: travel-tracking-budgetanalyticsui
          artifacts:
            - budgetanalyticsui.zip
          target-path: app//
        - name: travel-tracking-budgetui
          artifacts:
            - budgetui.zip
          target-path: app//

  # ----- TRAVEL TRACKING UI -----
  - name: travel-tracking-traveltrackingui
    type: html5
    path: app/traveltrackingui
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npx ui5 build --clean-dest --dest dist
      supported-platforms: []

  # ----- BUDGET MANAGER UI -----
  - name: travel-tracking-budgetmanagerui
    type: html5
    path: app/budgetmanagerui
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npx ui5 build --clean-dest --dest dist
      supported-platforms: []

  # ----- BUDGET ANALYTICS UI -----
  - name: travel-tracking-budgetanalyticsui
    type: html5
    path: app/budgetanalyticsui
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npx ui5 build --clean-dest --dest dist
      supported-platforms: []

  # ----- BUDGET COMBINED UI -----
  - name: travel-tracking-budgetui
    type: html5
    path: app/budgetui
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npx ui5 build --clean-dest --dest dist
      supported-platforms: []

  # ----- APP ROUTER -----
  - name: travel-tracking-approuter
    type: approuter.nodejs
    path: approuter
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
      disk-quota: 256M
    requires:
      - name: srv-api
        group: destinations
        properties:
          name: srv-api
          url: ~{srv-url}
          forwardAuthToken: true
      - name: travel-tracking-auth
      - name: travel-tracking-html5-repo-runtime

resources:
  # ----- HANA DATABASE -----
  - name: travel-tracking-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared

  # ----- XSUAA -----
  - name: travel-tracking-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: travel-tracking-${org}-${space}
        tenant-mode: dedicated

  # ----- HTML5 REPO HOST -----
  - name: travel-tracking-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host

  # ----- HTML5 REPO RUNTIME -----
  - name: travel-tracking-html5-repo-runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime