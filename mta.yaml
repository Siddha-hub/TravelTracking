_schema-version: "3.1"
ID: travel-tracking
version: 1.0.0
description: Travel Tracking & Budget Management Application
parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npm run build:cf

modules:
  - name: travel-tracking-srv
    type: nodejs
    path: gen/srv
    deployed-after:
      - travel-tracking-db-deployer
    parameters:
      buildpack: nodejs_buildpack
      disk-quota: 512M
      memory: 256M
    build-parameters:
      builder: npm
      ignore:
        - node_modules/
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: travel-tracking-auth
      - name: travel-tracking-db

  - name: travel-tracking-db-deployer
    type: hdb
    path: gen/db
    build-parameters:
      builder: npm
      ignore:
        - node_modules/
    parameters:
      buildpack: nodejs_buildpack
      disk-quota: 256M
      memory: 256M
    requires:
      - name: travel-tracking-db

  - name: travel-tracking-dest-content
    type: com.sap.application.content
    requires:
      - name: travel-tracking-dest
        parameters:
          content-target: true
      - name: srv-api
      - name: travel-tracking-auth
        parameters:
          service-key:
            name: travel-tracking-auth-key
      - name: travel-tracking-repo-host
        parameters:
          service-key:
            name: travel-tracking-repo-host-key
    parameters:
      content:
        instance:
          destinations:
            - Name: travel-tracking-srv
              Authentication: OAuth2JWTBearer
              TokenServiceInstanceName: travel-tracking-auth
              TokenServiceKeyName: travel-tracking-auth-key
              URL: ~{srv-api/srv-url}
              sap.cloud.service: sap.travel.tracking
              HTML5.Timeout: 120000
            - Name: travel-tracking-repo-host
              ServiceInstanceName: travel-tracking-repo-host
              ServiceKeyName: travel-tracking-repo-host-key
              sap.cloud.service: sap.travel.tracking
            - Name: travel-tracking-auth
              Authentication: OAuth2UserTokenExchange
              ServiceInstanceName: travel-tracking-auth
              ServiceKeyName: travel-tracking-auth-key
              sap.cloud.service: sap.travel.tracking
          existing_destinations_policy: update
    build-parameters:
      no-source: true

  - name: travel-tracking-app-content
    type: com.sap.application.content
    path: .
    requires:
      - name: travel-tracking-repo-host
        parameters:
          content-target: true
          service-key:
            name: travel-tracking-repo-host-key
    build-parameters:
      build-result: resources
      requires:
        - name: traveltrackingui
          target-path: resources/
          artifacts:
            - traveltrackingui.zip
        - name: budgetmanagerui
          target-path: resources/
          artifacts:
            - budgetmanagerui.zip
        - name: budgetanalyticsui
          target-path: resources/
          artifacts:
            - budgetanalyticsui.zip
        - name: budgetui
          target-path: resources/
          artifacts:
            - budgetui.zip

  - name: traveltrackingui
    type: html5
    path: app/traveltrackingui
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build:cf
      supported-platforms: []

  - name: budgetmanagerui
    type: html5
    path: app/budgetmanagerui
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build:cf
      supported-platforms: []

  - name: budgetanalyticsui
    type: html5
    path: app/budgetanalyticsui
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build:cf
      supported-platforms: []

  - name: budgetui
    type: html5
    path: app/budgetui
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build:cf
      supported-platforms: []

resources:
  - name: travel-tracking-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
      config:
        schema: TRAVEL_TRACKING_${space}
      service-keys:
        - name: travel-tracking-db-key

  - name: travel-tracking-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: travel-tracking-${space}
        tenant-mode: dedicated
      service-keys:
        - name: travel-tracking-auth-key

  - name: travel-tracking-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host
      service-keys:
        - name: travel-tracking-repo-host-key

  - name: travel-tracking-dest
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
      config:
        HTML5Runtime_enabled: true
        init_data:
          instance:
            destinations:
              - Authentication: NoAuthentication
                Name: ui5
                ProxyType: Internet
                Type: HTTP
                URL: https://ui5.sap.com
            existing_destinations_policy: update
        version: 1.0.0
      service-keys:
        - name: travel-tracking-dest-key
    