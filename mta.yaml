_schema-version: "3.2"
ID: travel-tracking
description: Travel Tracking & Budget Management Application
version: 1.0.0
modules:
- name: travel-tracking-srv
  type: nodejs
  path: gen/srv
  requires:
  - name: travel-tracking-db
  - name: travel-tracking-uaa
  provides:
  - name: srv-api
    properties:
      srv-url: ${default-url}
  parameters:
    buildpack: nodejs_buildpack
    disk-quota: 1024M
    memory: 256M
  build-parameters:
    ignore:
    - node_modules/
- name: travel-tracking-db-deployer
  type: hdb
  path: gen/db
  properties:
    HDI_DEPLOY_OPTIONS: '{ "auto_undeploy": true, "trace": true }'
  requires:
  - name: travel-tracking-db
  - name: travel-tracking-uaa
  parameters:
    buildpack: nodejs_buildpack
  build-parameters:
    ignore:
    - node_modules/
- name: travel-tracking-destinations
  type: com.sap.application.content
  requires:
  - name: travel-tracking-uaa
    parameters:
      service-key:
        name: travel-tracking-uaa-key
  - name: travel-tracking-html5-repo-host
    parameters:
      service-key:
        name: travel-tracking-html5-repo-host-key
  - name: srv-api
  - name: travel-tracking-destination
    parameters:
      content-target: true
  parameters:
    content:
      instance:
        destinations:
        - Authentication: OAuth2UserTokenExchange
          Name: travel-tracking-app-srv
          TokenServiceInstanceName: travel-tracking-uaa
          TokenServiceKeyName: travel-tracking-uaa-key
          URL: ~{srv-api/srv-url}
          sap.cloud.service: travel-tracking
        - Name: travel-tracking-html5-repo-host
          ServiceInstanceName: travel-tracking-html5-repo-host
          ServiceKeyName: travel-tracking-html5-repo-host-key
          sap.cloud.service: travel-tracking
        - Authentication: OAuth2UserTokenExchange
          Name: travel-tracking-uaa
          ServiceInstanceName: travel-tracking-uaa
          ServiceKeyName: travel-tracking-uaa-key
          sap.cloud.service: travel-tracking
        existing_destinations_policy: update
  build-parameters:
    no-source: true
- name: travel-tracking-app-content
  type: com.sap.application.content
  path: .
  requires:
  - name: travel-tracking-html5-repo-host
    parameters:
      content-target: true
  build-parameters:
    build-result: resources
    requires:
    - artifacts:
      - traveltrackingui.zip
      name: travel-tracking-traveltrackingui
      target-path: resources/
    - artifacts:
      - budgetmanagerui.zip
      name: travel-tracking-budgetmanagerui
      target-path: resources/
    - artifacts:
      - budgetanalyticsui.zip
      name: travel-tracking-budgetanalyticsui
      target-path: resources/
    - artifacts:
      - budgetui.zip
      name: travel-tracking-budgetui
      target-path: resources/
- name: travel-tracking-traveltrackingui
  type: html5
  path: app/traveltrackingui
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    ignore:
    - node_modules/
    supported-platforms: []
- name: travel-tracking-budgetmanagerui
  type: html5
  path: app/budgetmanagerui
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    ignore:
    - node_modules/
    supported-platforms: []
- name: travel-tracking-budgetanalyticsui
  type: html5
  path: app/budgetanalyticsui
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    ignore:
    - node_modules/
    supported-platforms: []
- name: travel-tracking-budgetui
  type: html5
  path: app/budgetui
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    ignore:
    - node_modules/
    supported-platforms: []
resources:
- name: travel-tracking-db
  type: com.sap.xs.hdi-container
  parameters:
    service: hana
    service-plan: hdi-shared
  properties:
    hdi-service-name: ${service-name}
- name: travel-tracking-uaa
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      role-collections:
      - description: Travel Tracking Administrator
        name: TravelTrackingAdmin-${space}
        role-template-references:
        - $XSAPPNAME.TravelAdmin
      tenant-mode: dedicated
      xsappname: travel-tracking-${space}
    path: ./xs-security.json
    service: xsuaa
    service-plan: application
- name: travel-tracking-destination
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: true
      init_data:
        instance:
          destinations:
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          existing_destinations_policy: update
      version: 1.0.0
    service: destination
    service-plan: lite
- name: travel-tracking-html5-repo-host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-plan: app-host
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
  - builder: custom
    commands:
    - npm install --production
    - npx -p @sap/cds-dk cds build --production
