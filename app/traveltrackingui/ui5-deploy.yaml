specVersion: "3.0"
metadata:
  name: traveltrackingui
type: application
builder:
  cachebuster:
    signatureType: hash
  resources:
    excludes:
      - "/test/**"
      - "/localService/**"
  customTasks:
    - name: ui5-task-minifier
      afterTask: minify
    - name: ui5-task-zipper
      afterTask: generateCachebusterInfo
      configuration:
        archiveName: traveltrackingui
        additionalFiles:
          - xs-app.json
